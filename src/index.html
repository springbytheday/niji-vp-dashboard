<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voicepack collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@100;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">
    <div class="header">
      <div class="header-left">
        <h1>Voicepack collection</h1>
        <p>Nijisanji · track your voice packs</p>
      </div>
      <button class="btn-add" id="btn-add">+ Add pack</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="lbl">Total</div>
        <div class="val" id="s-total">—</div>
      </div>
      <div class="stat">
        <div class="lbl">Livers</div>
        <div class="val" id="s-livers">—</div>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="search" placeholder="Search by title or liver…" />
      <select id="filter-store">
        <option value="">All stores</option>
        <option value="EN">EN Store</option>
        <option value="JP">JP Store</option>
      </select>
      <select id="filter-liver">
        <option value="">All livers</option>
      </select>
      <select id="sort-by">
        <option value="">Sort: Default</option>
        <option value="date-asc">Date ↑</option>
        <option value="date-desc">Date ↓</option>
        <option value="title-asc">Title A → Z</option>
        <option value="title-desc">Title Z → A</option>
      </select>
    </div>

    <div class="type-tabs">
      <button class="tab active" data-type="">All types</button>
      <button class="tab" data-type="monthly">Monthly</button>
      <button class="tab" data-type="birthday">Birthday</button>
      <button class="tab" data-type="limited">Limited</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
      <div class="modal-header">
        <h2 id="modal-heading">Voicepack</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="icon-btn" id="btn-edit-mode" aria-label="Edit">✏️</button>
          <button class="close-btn" id="modal-close" aria-label="Close">×</button>
        </div>
      </div>

      <!-- VIEW MODE -->
      <div id="view-mode">
        <div class="view-emoji" id="v-emoji"></div>
        <div class="view-liver" id="v-liver"></div>
        <div class="view-title-en" id="v-en"></div>
        <div class="view-title-jp" id="v-jp"></div>
        <div class="view-meta">
          <span class="badge" id="v-badge"></span>
          <span class="badge" id="v-store-badge"></span>
        </div>
        <div class="view-row" id="v-date-row">
          <span class="view-lbl">Release date</span>
          <span id="v-date"></span>
        </div>
        <div class="view-row" id="v-notes-row">
          <span class="view-lbl">Notes</span>
          <span id="v-notes"></span>
        </div>
      </div>

      <!-- EDIT MODE -->
      <div id="edit-mode" style="display:none">
        <div class="field-row">
          <div class="field">
            <label for="f-en">Title — English</label>
            <input type="text" id="f-en" placeholder="English title" autocomplete="off" />
          </div>
          <div class="field">
            <label for="f-jp">Title — Japanese</label>
            <input type="text" id="f-jp" placeholder="日本語タイトル" autocomplete="off" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-liver">Liver</label>
            <input type="text" id="f-liver" placeholder="e.g. Sakayori Soma" autocomplete=" off" list="liver-list" />
            <datalist id="liver-list"></datalist>
          </div>
          <div class="field">
            <label for="f-date">Release date</label>
            <input type="date" id="f-date" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-type">Type</label>
            <select id="f-type">
              <option value="monthly">Monthly</option>
              <option value="birthday">Birthday</option>
              <option value="limited">Limited</option>
            </select>
          </div>
          <div class="field">
            <label for="f-store">Store</label>
            <select id="f-store">
              <option value="">Unknown</option>
              <option value="EN">EN Store</option>
              <option value="JP">JP Store</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="f-notes">Notes</label>
          <textarea id="f-notes" placeholder="Any notes about this voicepack…"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-delete" id="btn-delete" style="display:none">Delete</button>
        <span class="spacer"></span>
        <button class="btn-cancel" id="btn-cancel">Close</button>
        <button class="btn-save" id="btn-save" style="display:none">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>

</html>
